version: 3

models:
  - name: stg_jobs
    description: "Raw job offer data extracted from the Supabase source."
    
    columns:
      - name: job_id
        description: "The unique identifier for a job offer. Primary key."
        tests:
          - unique
          - not_null

      - name: title
        description: "The original job title."
        tests:
          - not_null

      - name: company_name
        description: "The name of the company posting the job."
        tests:
          - not_null

      - name: location
        description: "The raw location string (e.g., 'Paris', 'Remote')."

      - name: description
        description: "The full text of the job description."

      - name: via
        description: "The source platform (e.g., 'via LinkedIn')."

      - name: created_at
        description: "Timestamp when the record was first inserted into Supabase."
        tests:
          - not_null

      - name: raw_posted_at
        description: "The relative posting time as a string (e.g., 'il y a 11 heures'). Extracted from detected_extensions."

      - name: raw_salary
        description: "The raw salary string (e.g., '350 € par jour'). Extracted from detected_extensions."

      - name: raw_schedule_type
        description: "The raw schedule string (e.g., 'À plein temps'). Extracted from detected_extensions."

      - name: apply_link_1
        description: "The primary application URL."

      - name: apply_link_2
        description: "The secondary application URL if available."